# Buy rules aligned with Test Strip Kingz official payout price list.
# max_price = client payout from Test Strip Kingz list.
# Alerts allow up to MAX_PRICE_TOLERANCE_PERCENT above list price (default 10 in .env).

rules:
  # --- DEXCOM & CGMS ---
  - keyword: "Dexcom G6 sensors"
    max_price: 117.50
    min_price: 15
    match_in: title
    exclude_words: &standard_excludes
      - "expired"
      - "opened"
      - "damaged"
      - "short dated"
      - "empty"
      - "for parts"
      - "box only"
      - "empty box"
      - "manual only"
      - "instructions only"
      - "dummy"
      - "training"
      - "display only"
      - "prop"
      - "replica"
      - "open box"
      - "pre-owned"
      - "pre owned"
      - "preowned"
      - "sensor cover"
      - "sensor covers"
      - "waterproof"
      - "sweatproof"
      - "adhesive patches"
      - "compatible with"
      - "decal sticker"
      - "overpatch"
      - "over patch"
      - "overpatches"
      - "skin grip"
      - "grip tape"
      - "adhesive patch"
      - "sensor patch"
      - "patch cover"
      - "patch only"
      - "patches only"
      - "patch pack"
      - "patch"
      - "adhesive"
      - "overlay"
